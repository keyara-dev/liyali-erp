name: Deploy - Production

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

jobs:
  deploy:
    name: Deploy to ${{ matrix.environment }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [staging, production]
    environment:
      name: ${{ matrix.environment }}
      url: https://${{ matrix.environment }}.liyali.com

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Determine deployment environment
      id: env
      run: |
        if [[ "${{ github.ref }}" == "refs/tags/v"* ]]; then
          echo "environment=production" >> $GITHUB_OUTPUT
          echo "deploy=true" >> $GITHUB_OUTPUT
        else
          echo "environment=staging" >> $GITHUB_OUTPUT
          echo "deploy=${{ github.event_name == 'workflow_dispatch' }}" >> $GITHUB_OUTPUT
        fi

    - name: Deploy to ${{ steps.env.outputs.environment }}
      if: steps.env.outputs.deploy == 'true'
      env:
        DEPLOYMENT_ENV: ${{ steps.env.outputs.environment }}
        DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
        DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      run: |
        # Setup SSH key
        mkdir -p ~/.ssh
        echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key
        ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

        # Deploy application
        ssh -i ~/.ssh/deploy_key deploy@"$DEPLOY_HOST" << 'DEPLOY_SCRIPT'
          set -e
          echo "Deploying to $DEPLOYMENT_ENV..."

          # Pull latest code
          cd /opt/liyali-gateway
          git pull origin main

          # Build Docker image
          docker build -t liyali-gateway:latest .

          # Stop running container
          docker-compose down

          # Start new container
          docker-compose up -d

          # Run migrations if needed
          docker-compose exec -T liyali-backend ./bin/liyali-gateway migrate

          # Health check
          sleep 5
          curl -f http://localhost:8080/health || exit 1

          echo "Deployment complete!"
        DEPLOY_SCRIPT

    - name: Notify deployment
      if: always()
      uses: actions/github-script@v7
      with:
        script: |
          const status = context.payload.workflow_run?.conclusion || 'success';
          const env = '${{ steps.env.outputs.environment }}';

          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: `Deployment to ${env}: ${status}`
          });

    - name: Create deployment record
      if: steps.env.outputs.deploy == 'true'
      uses: actions/github-script@v7
      with:
        script: |
          github.rest.repos.createDeployment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            ref: context.ref,
            environment: '${{ steps.env.outputs.environment }}',
            auto_merge: false,
            description: 'Liyali Gateway deployment'
          });
