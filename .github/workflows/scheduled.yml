name: Scheduled Tasks

on:
  schedule:
    # Run dependency checks daily at 2 AM UTC
    - cron: '0 2 * * *'
    # Run security scan weekly on Monday at 2 AM UTC
    - cron: '0 2 * * 1'

jobs:
  dependency-check:
    name: Check Dependencies
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'

    - name: Check for Go updates
      run: |
        go install github.com/golang/go@latest
        go version
      continue-on-error: true

    - name: Run go mod tidy check
      run: |
        go mod tidy
        if [ -n "$(git diff go.mod go.sum)" ]; then
          echo "❌ Go modules need updating:"
          git diff go.mod go.sum
          exit 1
        fi
      working-directory: backend

    - name: Check for outdated dependencies
      run: |
        go install github.com/psampaz/go-mod-outdated@latest
        go list -u -m -json all | go-mod-outdated -update -direct
      working-directory: backend
      continue-on-error: true

    - name: Run vulnerability scan
      run: |
        go install github.com/golang/vuln/cmd/govulncheck@latest
        govulncheck ./...
      working-directory: backend
      continue-on-error: true

    - name: Create issue for outdated dependencies
      if: failure()
      uses: actions/github-script@v7
      with:
        script: |
          github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: '🔄 Dependencies need updating',
            body: 'Scheduled dependency check found outdated packages.',
            labels: ['dependencies', 'maintenance']
          });

  test-coverage:
    name: Test Coverage Report
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: liyali-test-db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'

    - name: Run coverage analysis
      env:
        DB_HOST: localhost
        DB_PORT: 5432
        DB_USER: postgres
        DB_PASSWORD: postgres
        DB_NAME: liyali-test-db
        DB_SSL_MODE: disable
        REDIS_HOST: localhost
        REDIS_PORT: 6379
        JWT_SECRET: test-secret-key
        ENVIRONMENT: test
      run: make test-coverage
      working-directory: backend

    - name: Calculate coverage percentage
      run: |
        COVERAGE=$(go tool cover -func coverage.out | grep total | awk '{print $3}' | sed 's/%//')
        echo "📊 Coverage: ${COVERAGE}%"
        echo "COVERAGE=${COVERAGE}" >> $GITHUB_ENV
      working-directory: backend

    - name: Comment coverage on repo
      uses: actions/github-script@v7
      with:
        script: |
          github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: 1,
            body: `📊 Daily Coverage Report: ${{ env.COVERAGE }}%`
          });
      continue-on-error: true

  health-check:
    name: Service Health Check
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Check Docker Compose configuration
      run: |
        docker-compose config -q
        echo "✅ Docker Compose configuration is valid"

    - name: Validate OpenAPI specification
      run: |
        # Install swagger-cli
        npm install -g swagger-cli

        # Validate OpenAPI spec
        swagger-cli validate backend/openapi.yaml
        echo "✅ OpenAPI specification is valid"

    - name: Check documentation links
      run: |
        # Check for broken markdown links
        npm install -g markdown-link-check

        markdown-link-check backend/API-DOCUMENTATION.md
        markdown-link-check DOCKER-GUIDE.md
        markdown-link-check backend/TESTING-SUMMARY.md
      continue-on-error: true

  performance-baseline:
    name: Performance Baseline
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: liyali-test-db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'

    - name: Run benchmarks
      env:
        DB_HOST: localhost
        DB_PORT: 5432
        DB_USER: postgres
        DB_PASSWORD: postgres
        DB_NAME: liyali-test-db
        DB_SSL_MODE: disable
        REDIS_HOST: localhost
        REDIS_PORT: 6379
        JWT_SECRET: test-secret-key
        ENVIRONMENT: test
      run: |
        make bench > bench-results.txt 2>&1
        cat bench-results.txt
      working-directory: backend

    - name: Upload benchmark results
      uses: actions/upload-artifact@v3
      with:
        name: benchmark-results
        path: backend/bench-results.txt

    - name: Compare with baseline
      run: |
        if [ -f benchmark-baseline.txt ]; then
          echo "Comparing with baseline..."
          diff -u benchmark-baseline.txt bench-results.txt || true
        else
          echo "No baseline found, creating new one..."
          cp bench-results.txt benchmark-baseline.txt
        fi
      working-directory: backend
      continue-on-error: true
