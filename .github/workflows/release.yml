name: Release

on:
  push:
    tags: [ 'v*' ]

jobs:
  build:
    name: Build Release
    runs-on: ubuntu-latest

    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'

    - name: Build
      env:
        GOOS: ${{ matrix.goos }}
        GOARCH: ${{ matrix.goarch }}
        CGO_ENABLED: 0
      run: |
        OUTPUT_NAME=liyali-gateway
        if [ "$GOOS" = "windows" ]; then
          OUTPUT_NAME="${OUTPUT_NAME}.exe"
        fi

        go build \
          -ldflags="-w -s" \
          -o "bin/${OUTPUT_NAME}" \
          ./cmd/server

        # Create checksums
        cd bin
        sha256sum "${OUTPUT_NAME}" > "${OUTPUT_NAME}.sha256"
      working-directory: backend

    - name: Upload artifacts
      uses: actions/upload-artifact@v3
      with:
        name: liyali-gateway-${{ matrix.goos }}-${{ matrix.goarch }}
        path: backend/bin/*

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build

    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Download all artifacts
      uses: actions/download-artifact@v3
      with:
        path: artifacts

    - name: Create Release Notes
      id: notes
      run: |
        VERSION=${GITHUB_REF#refs/tags/}
        echo "version=${VERSION}" >> $GITHUB_OUTPUT

        # Generate release notes from commits
        COMMIT_LOG=$(git log $(git describe --tags --abbrev=0 HEAD^)..HEAD --oneline)
        echo "## Changes in ${VERSION}" >> /tmp/release-notes.md
        echo "" >> /tmp/release-notes.md
        echo "\`\`\`" >> /tmp/release-notes.md
        echo "$COMMIT_LOG" >> /tmp/release-notes.md
        echo "\`\`\`" >> /tmp/release-notes.md

        cat /tmp/release-notes.md

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: artifacts/**/*
        body_path: /tmp/release-notes.md
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Publish Docker image
      run: |
        docker build -t ghcr.io/${{ github.repository }}:${{ steps.notes.outputs.version }} .
        docker push ghcr.io/${{ github.repository }}:${{ steps.notes.outputs.version }}
        docker tag ghcr.io/${{ github.repository }}:${{ steps.notes.outputs.version }} ghcr.io/${{ github.repository }}:latest
        docker push ghcr.io/${{ github.repository }}:latest

    - name: Update CHANGELOG
      run: |
        VERSION=${GITHUB_REF#refs/tags/}
        DATE=$(date +"%Y-%m-%d")

        echo "## [$VERSION] - $DATE" >> /tmp/changelog-entry.md
        echo "" >> /tmp/changelog-entry.md
        echo "### Added" >> /tmp/changelog-entry.md
        echo "- Release version $VERSION" >> /tmp/changelog-entry.md
        echo "" >> /tmp/changelog-entry.md

        if [ -f CHANGELOG.md ]; then
          cat CHANGELOG.md >> /tmp/changelog-entry.md
          mv /tmp/changelog-entry.md CHANGELOG.md
        else
          mv /tmp/changelog-entry.md CHANGELOG.md
        fi

    - name: Commit CHANGELOG
      run: |
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git add CHANGELOG.md
        git commit -m "docs: Update CHANGELOG for release ${GITHUB_REF#refs/tags/}" || true
        git push || true
      continue-on-error: true
