name: Deploy to Staging Environment - (Fly.io)

on:
  push:
    branches:
      - develop # Deploy to Fly.io on develop branch
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/fly-deploy.yml"
  workflow_dispatch: # Allow manual trigger
    inputs:
      deploy_backend:
        description: "Deploy backend"
        required: false
        default: "true"
        type: boolean
      deploy_frontend:
        description: "Deploy frontend"
        required: false
        default: "true"
        type: boolean

jobs:
  deploy-backend:
    name: Deploy Backend to Fly.io
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Debug - Show deployment context
        run: |
          echo "Event name: ${{ github.event_name }}"
          echo "Ref: ${{ github.ref }}"
          echo "SHA: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          git log --oneline -2
          git show --name-only HEAD

      - name: Setup Fly.io CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy Backend
        run: |
          cd backend
          flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Get Backend URL
        id: backend-url
        run: |
          cd backend
          URL=$(flyctl info --json | jq -r '.Hostname')
          echo "url=https://${URL}" >> $GITHUB_OUTPUT
          echo "Backend deployed to: https://${URL}"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deployment Summary
        run: |
          echo "## 🚀 Backend Deployed to Fly.io" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: Demo/Staging" >> $GITHUB_STEP_SUMMARY
          echo "- **App**: liyali-backend" >> $GITHUB_STEP_SUMMARY
          echo "- **URL**: ${{ steps.backend-url.outputs.url }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY

  deploy-frontend:
    name: Deploy Frontend to Fly.io
    runs-on: ubuntu-latest
    needs: deploy-backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Fly.io CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy Frontend
        run: |
          cd frontend
          flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Get Frontend URL
        id: frontend-url
        run: |
          cd frontend
          URL=$(flyctl info --json | jq -r '.Hostname')
          echo "url=https://${URL}" >> $GITHUB_OUTPUT
          echo "Frontend deployed to: https://${URL}"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deployment Summary
        run: |
          echo "## 🚀 Frontend Deployed to Fly.io" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: Demo/Staging" >> $GITHUB_STEP_SUMMARY
          echo "- **App**: liyali-frontend" >> $GITHUB_STEP_SUMMARY
          echo "- **URL**: ${{ steps.frontend-url.outputs.url }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
