name: Deploy to Staging Environment - (Fly.io)

on:
  push:
    branches:
      - develop # Deploy to Fly.io on develop branch
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/fly-deploy.yml"
  workflow_dispatch: # Allow manual trigger

jobs:
  deploy-backend:
    name: Deploy Backend to Fly.io
    runs-on: ubuntu-latest
    # Only deploy backend if backend files changed or manual trigger
    if: github.event_name == 'workflow_dispatch' || contains(join(github.event.commits.*.modified, ' '), 'backend/') || contains(join(github.event.commits.*.added, ' '), 'backend/')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Fly.io CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy Backend
        run: |
          cd backend
          flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Get Backend URL
        id: backend-url
        run: |
          cd backend
          URL=$(flyctl info --json | jq -r '.Hostname')
          echo "url=https://${URL}" >> $GITHUB_OUTPUT
          echo "Backend deployed to: https://${URL}"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deployment Summary
        run: |
          echo "## 🚀 Backend Deployed to Fly.io" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: Demo/Staging" >> $GITHUB_STEP_SUMMARY
          echo "- **App**: liyali-backend" >> $GITHUB_STEP_SUMMARY
          echo "- **URL**: ${{ steps.backend-url.outputs.url }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY

  deploy-frontend:
    name: Deploy Frontend to Fly.io
    runs-on: ubuntu-latest
    needs: deploy-backend
    # Only deploy frontend if frontend files changed or manual trigger
    if: github.event_name == 'workflow_dispatch' || contains(join(github.event.commits.*.modified, ' '), 'frontend/') || contains(join(github.event.commits.*.added, ' '), 'frontend/')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Fly.io CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy Frontend
        run: |
          cd frontend
          flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Get Frontend URL
        id: frontend-url
        run: |
          cd frontend
          URL=$(flyctl info --json | jq -r '.Hostname')
          echo "url=https://${URL}" >> $GITHUB_OUTPUT
          echo "Frontend deployed to: https://${URL}"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deployment Summary
        run: |
          echo "## 🚀 Frontend Deployed to Fly.io" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: Demo/Staging" >> $GITHUB_STEP_SUMMARY
          echo "- **App**: liyali-frontend" >> $GITHUB_STEP_SUMMARY
          echo "- **URL**: ${{ steps.frontend-url.outputs.url }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
