# fly.toml app configuration file generated for liyali-gateway-api on 2026-01-16T22:45:49Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'liyali-gateway-api'
primary_region = 'jnb'

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  APP_ENV = "production"
  GO_ENV = "production"
  JWT_SECRET.from_secret = "JWT_SECRET"
  DATABASE_URL.from_secret = "DATABASE_URL"
  CORS_ALLOWED_ORIGINS.from_secret = "CORS_ALLOWED_ORIGINS"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "connections"
    hard_limit = 50
    soft_limit = 40

  [[http_service.checks]]
    grace_period = "15s"
    interval = "30s"
    method = "GET"
    timeout = "10s"
    path = "/health"

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512

[deploy]
  # Removed automatic migration to prevent deployment timeouts
  # Run migrations manually after deployment: flyctl ssh console -C "go run database/migrate_all.go"

# Secrets (set via flyctl secrets set)
# DATABASE_URL - PostgreSQL connection string
# JWT_SECRET - JWT signing secret  
# CORS_ALLOWED_ORIGINS - Allowed CORS origins
