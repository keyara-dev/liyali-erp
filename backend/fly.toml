# fly.toml app configuration file generated for liyali-gateway-api on 2026-01-16T22:45:49Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'liyali-gateway-api'
primary_region = 'jnb'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "connections"
    hard_limit = 50
    soft_limit = 40

  [[http_service.checks]]
    grace_period = "15s"
    interval = "30s"
    method = "GET"
    timeout = "10s"
    path = "/health"

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512

# Note: Migrations should be run manually for production safety
# To run migrations: flyctl ssh console -a liyali-gateway-api
# Then: go run cmd/migrate/main.go -migrate
