# Fly.io configuration for Liyali Gateway Frontend
app = "liyali-gateway-frontend"
primary_region = "jnb" # Johannesburg - same region as backend for optimal performance

[build]
  dockerfile = "Dockerfile"

  [build.args]
    NEXT_PUBLIC_API_URL = "https://liyali-gateway-api.fly.dev"
    NEXT_PUBLIC_APP_URL = "https://liyali-gateway-frontend.fly.dev"
    NEXT_PUBLIC_IMAGEKIT_PUBLIC_KEY = "public_lpyell0B3Kh6vmDGa/oN/frlhTs="
    NEXT_PUBLIC_IMAGEKIT_URL_ENDPOINT = "https://ik.imagekit.io/eb8aq3pja"

[env]
  PORT = "3000"
  NODE_ENV = "production"
  NEXT_TELEMETRY_DISABLED = "1"
  HOSTNAME = "0.0.0.0"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/api/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512

# Secrets (set via flyctl secrets set)
# NEXT_PUBLIC_API_URL - Backend API URL
# DATABASE_URL - PostgreSQL connection string (for server actions)
# NEXTAUTH_SECRET - NextAuth signing secret
# NEXTAUTH_URL - Frontend URL for NextAuth
