# Fly.io configuration for Liyali Admin Console
app = "liyali-admin-console"
primary_region = "jnb" # Johannesburg - same region as backend for optimal performance

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3001"
  NODE_ENV = "production"
  NEXT_TELEMETRY_DISABLED = "1"
  HOSTNAME = "0.0.0.0"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512

# Secrets (set via flyctl secrets set)
# NEXT_PUBLIC_API_URL - Backend API URL
# NEXTAUTH_SECRET - NextAuth signing secret (if using auth)
# NEXTAUTH_URL - Admin console URL for NextAuth
